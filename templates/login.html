{% extends 'base.html' %}

{% block content %}
<section class="py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">

        <h2 class="mb-4 text-center">Вхід</h2>

        {% if messages %}
          {% for message in messages %}
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
          {% endfor %}
        {% endif %}

        <div class="card border-0 shadow-sm rounded-4">
          <div class="card-body p-4">
            <form method="post" novalidate>
              {% csrf_token %}

              <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Логін</label>
                <input type="text" name="username" id="username"
                  class="form-control bg-light border-0 rounded-3" required>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label fw-semibold">Пароль</label>
                <input type="password" name="password" id="password"
                  class="form-control bg-light border-0 rounded-3" required>
              </div>

              <button type="submit" class="btn btn-dark w-100 mt-2 rounded-3">
                Увійти
              </button>
            </form>

            <p class="text-center text-muted mt-3 mb-0">
              Немає акаунту? <a href="{% url 'register' %}">Зареєструватись</a>
            </p>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}
